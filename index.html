<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩协调工具</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;padding:30px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center;border-radius:16px 16px 0 0;margin:-30px -30px 30px}
.btn{background:#667eea;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.btn-success{background:#28a745}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#667eea;color:white}
tr:nth-child(even){background:#f5f5f5}
.tab{display:inline-block;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{border-bottom-color:#667eea;color:#667eea;font-weight:bold}
.tab-content{display:none;padding:20px 0}
.tab-content.active{display:block}
.status{padding:15px;border-radius:8px;margin:15px 0}
.status.success{background:#d4edda;color:#155724}
.status.error{background:#f8d7da;color:#721c24}
.status.info{background:#d1ecf1;color:#0c5460}
.upload-area{border:2px dashed #667eea;border-radius:12px;padding:40px;text-align:center;background:#f0f4ff;cursor:pointer}
input[type=number]{width:70px;padding:5px;text-align:center;border:1px solid #ccc;border-radius:4px}
.score-up{color:#28a745;font-weight:bold}
.score-down{color:#dc3545;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎓 成绩协调工具（修复版）</h1>
<p>上传Excel → 设置目标排名 → 自动调整 → 导出结果</p>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('upload')">📤 上传</div>
<div class="tab" onclick="switchTab('rank')">📊 当前排名</div>
<div class="tab" onclick="switchTab('target')">🎯 设置目标</div>
<div class="tab" onclick="switchTab('result')">✅ 调整结果</div>
</div>

<div id="tab-upload" class="tab-content active">
<div class="upload-area" onclick="document.getElementById('f').click()">
<h2>📁 点击上传Excel成绩单</h2>
<p>格式：序号 | 姓名 | 目标排名 | 面试官1-5(各4列) | 初试成绩 | 总成绩</p>
</div>
<input type="file" id="f" accept=".xlsx" style="display:none" onchange="handleFile(event)">
<div id="s1"></div>
</div>

<div id="tab-rank" class="tab-content">
<button class="btn" onclick="calcRank()">🔄 计算当前排名</button>
<div id="s2"></div>
<div id="t1"></div>
</div>

<div id="tab-target" class="tab-content">
<div id="s3"></div>
<div id="t2"></div>
</div>

<div id="tab-result" class="tab-content">
<button class="btn btn-success" onclick="downloadResult()">⬇️ 下载调整后的Excel</button>
<div id="s4"></div>
<div id="t3"></div>
</div>
</div>

<script>
let students=[],experts=[],current=[],results=[];
const SUB=['综合素质','面试','笔试','英语'];

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}
function show(id,type,msg){
  const el=document.getElementById(id);
  el.className='status '+type;
  el.innerHTML=msg;
}

function handleFile(e){
  const file=e.target.files[0];
  if(!file)return;
  show('s1','info','正在读取文件...');
  const r=new FileReader();
  r.onload=function(e){
    try{
      const d=new Uint8Array(e.target.result);
      const wb=XLSX.read(d,{type:'array'});
      const s=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(s,{header:1});
      parse(data);
      show('s1','success','✅ 成功加载 '+students.length+' 名学生');
      setTimeout(()=>{document.querySelector('.tab:nth-child(2)').click();calcRank();},500);
    }catch(err){
      show('s1','error','❌ 读取失败: '+err.message);
    }
  };
  r.readAsArrayBuffer(file);
}

function parse(data){
  students=[];experts=[];
  const h=data[0];
  for(let i=0;i<h.length;i++){
    if(h[i]&&String(h[i]).includes('面试官')){
      experts.push(String(h[i]).trim());
    }
  }
  let ci=-1,ct=-1;
  for(let i=0;i<h.length;i++){
    const v=String(h[i]||'');
    if(v.includes('初试'))ci=i;
    if(v==='总成绩'||v.includes('总分'))ct=i;
  }
  let expertStart=-1;
  for(let i=0;i<h.length;i++){
    if(h[i]&&String(h[i]).includes('面试官')){
      expertStart=i;
      break;
    }
  }
  for(let i=1;i<data.length;i++){
    const r=data[i];
    if(!r[0])continue;
    const ex={};
    for(let j=0;j<experts.length;j++){
      ex[experts[j]]={};
      SUB.forEach((sub,k)=>{
        const colIdx=expertStart+j*4+k;
        ex[experts[j]][sub]=parseFloat(r[colIdx])||0;
      });
    }
    students.push({
      seq:String(r[0]),
      name:String(r[1]||''),
      target:parseInt(r[2])||0,
      initial:parseFloat(r[ci])||0,
      total:parseFloat(r[ct])||0,
      scores:ex
    });
  }
}

function calcRank(){
  if(students.length===0){show('s2','error','请先上传文件');return;}
  current=students.map(s=>{
    const avgs=SUB.map(sub=>{
      const sc=experts.map(e=>s.scores[e][sub]);
      return sc.reduce((a,b)=>a+b,0)/sc.length;
    });
    const ret=avgs.reduce((a,b)=>a+b,0)/4;
    const tot=s.initial/10+ret/2;
    return{...s,retest:ret,total:tot};
  }).sort((a,b)=>b.total-a.total);
  let html='<table><tr><th>排名</th><th>序号</th><th>姓名</th><th>初试</th><th>复试均分</th><th>总分</th><th>目标排名</th></tr>';
  current.forEach((s,i)=>{
    const tgt=s.target>0?'<b style="color:#667eea">'+s.target+'</b>':'-';
    html+='<tr><td>'+(i+1)+'</td><td>'+s.seq+'</td><td>'+s.name+'</td><td>'+s.initial+'</td><td>'+s.retest.toFixed(2)+'</td><td><b>'+s.total.toFixed(2)+'</b></td><td>'+tgt+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('t1').innerHTML=html;
  show('s2','success','✅ 当前排名计算完成');
  renderTargetInput();
}

function renderTargetInput(){
  let html='<h3>设置目标排名（1=第一名），然后点击批量调整</h3>';
  html+='<table><tr><th>当前排名</th><th>序号</th><th>姓名</th><th>初试</th><th>当前总分</th><th>目标排名</th></tr>';
  current.forEach((s,i)=>{
    html+='<tr><td>'+(i+1)+'</td><td>'+s.seq+'</td><td>'+s.name+'</td><td>'+s.initial+'</td><td>'+s.total.toFixed(2)+'</td><td><input type="number" id="target-'+s.seq+'" value="'+(s.target||'')+'" min="1" placeholder="输入排名"></td></tr>';
  });
  html+='</table>';
  html+='<div style="margin-top:15px"><button class="btn btn-success" onclick="adjustAll()">🚀 批量调整全部</button></div>';
  document.getElementById('t2').innerHTML=html;
  show('s3','info','请设置目标排名后点击批量调整');
}

function adjustAll(){
  if(current.length===0){show('s3','error','没有数据');return;}
  results=[]; // 清空之前的结果
  const targets=[];
  current.forEach(s=>{
    const input=document.getElementById('target-'+s.seq);
    const target=input?parseInt(input.value):0;
    if(target>0) targets.push({...s,target:target});
  });
  if(targets.length===0){show('s3','error','请至少设置一个目标排名');return;}
  targets.sort((a,b)=>a.target-b.target);
  
  const minGap=0.3;
  targets.forEach((s,idx)=>{
    let targetTotal;
    if(idx===0){
      targetTotal=Math.min(Math.max(s.total,85)+2,98);
    }else{
      targetTotal=results[idx-1].newTotal-minGap;
    }
    targetTotal=Math.max(targetTotal,60);
    const targetRetest=(targetTotal-s.initial/10)*2;
    const factor=s.retest>0?targetRetest/s.retest:1;
    
    const adj={}, adjAvgs={};
    SUB.forEach(sub=>{
      adj[sub]={};
      const newScores=[];
      experts.forEach(e=>{
        const orig=s.scores[e][sub];
        let newScore=70+(orig-70)*factor;
        newScore=Math.max(60,Math.min(100,newScore));
        newScore=Math.round(newScore*10)/10;
        adj[sub][e]=newScore;
        newScores.push(newScore);
      });
      adjAvgs[sub]=newScores.reduce((a,b)=>a+b,0)/newScores.length;
    });
    
    const newRetest=SUB.reduce((sum,sub)=>sum+adjAvgs[sub],0)/4;
    const newTotal=s.initial/10+newRetest/2;
    
    results.push({
      seq:s.seq, name:s.name, target:s.target,
      initial:s.initial, oldRetest:s.retest, oldTotal:s.total,
      adj:adj, adjAvgs:adjAvgs, newRetest:newRetest, newTotal:newTotal
    });
  });
  showAdjustResult();
}

function showAdjustResult(){
  results.sort((a,b)=>a.target-b.target);
  let html='<table><tr><th>目标排名</th><th>序号</th><th>姓名</th><th>初试</th><th>原复试</th><th>新复试</th><th>原总分</th><th>新总分</th><th>变化</th></tr>';
  results.forEach((r,idx)=>{
    const chg=r.newTotal-r.oldTotal;
    const chgClass=chg>=0?'score-up':'score-down';
    const chgStr=(chg>=0?'+':'')+chg.toFixed(2);
    let rankOk=true;
    if(idx>0 && results[idx-1].newTotal<=r.newTotal) rankOk=false;
    html+='<tr>';
    html+='<td><b style="color:#667eea">'+r.target+'</b>'+(rankOk?'':' ⚠️')+'</td>';
    html+='<td>'+r.seq+'</td><td>'+r.name+'</td><td>'+r.initial+'</td>';
    html+='<td>'+r.oldRetest.toFixed(2)+'</td><td><b>'+r.newRetest.toFixed(2)+'</b></td>';
    html+='<td>'+r.oldTotal.toFixed(2)+'</td><td><b>'+r.newTotal.toFixed(2)+'</b></td>';
    html+='<td class="'+chgClass+'">'+chgStr+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('t3').innerHTML=html;
  show('s4','success','✅ 调整完成！共'+results.length+'人');
  setTimeout(()=>{document.querySelector('.tab:nth-child(4)').click();},300);
}

function downloadResult(){
  if(results.length===0){alert('没有调整结果');return;}
  const data=results.map(r=>{
    const row={'考生序号':r.seq,'姓名':r.name,'目标排名':r.target,'初试成绩':r.initial,
      '原复试平均分':r.oldRetest.toFixed(2),'新复试平均分':r.newRetest.toFixed(2),
      '原总成绩':r.oldTotal.toFixed(2),'新总成绩':r.newTotal.toFixed(2),
      '分数变化':(r.newTotal-r.oldTotal).toFixed(2)};
    SUB.forEach(s=>{row[s+'平均分']=r.adjAvgs[s].toFixed(2);});
    experts.forEach(e=>{SUB.forEach(s=>{row[e+'_'+s]=r.adj[s][e];});});
    return row;
  });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'调整后成绩单');
  XLSX.writeFile(wb,'调整后成绩单.xlsx');
  show('s4','success','✅ 已下载');
}
</script>
</body>
</html>
