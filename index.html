<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩协调工具-稳定版</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center}
.tabs{display:flex;background:#f8f9fa;border-bottom:1px solid #e9ecef}
.tab{flex:1;padding:15px;text-align:center;cursor:pointer}
.tab.active{color:#667eea;border-bottom:3px solid #667eea;background:white}
.tab-content{display:none;padding:30px}
.tab-content.active{display:block}
.btn{background:#667eea;color:white;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.btn-success{background:#28a745}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px}
th,td{padding:10px 8px;border:1px solid #ddd;text-align:center}
th{background:#667eea;color:white}
.status{padding:15px;border-radius:8px;margin:15px 0}
.status.success{background:#d4edda;color:#155724}
.status.warning{background:#fff3cd;color:#856404}
.upload-area{border:3px dashed #667eea;border-radius:12px;padding:50px;text-align:center;background:#f0f4ff;cursor:pointer;margin:20px 0}
.target-input{width:70px;padding:8px;text-align:center;border:2px solid #ced4da;border-radius:4px}
.target-input:focus{border-color:#667eea;outline:none}
.target-input.changed{border-color:#28a745;background:#d4edda}
.modified{background:#ffebee!important;color:#c62828!important;font-weight:bold}
.need-adjust{background:#fff8e1!important}
.unchanged{background:#e8f5e9!important}
.download-section{display:none;padding:20px;background:#d4edda;border-radius:8px;text-align:center;margin-top:20px}
.download-section.show{display:block}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎓 成绩协调工具（稳定版）</h1>
<p>列0=序号, 列1=姓名, 列2-21=评委1-5打分, 列27=初试, 列28=总成绩, 列29=目标排名</p>
</div>

<div class="tabs">
<div class="tab active" data-tab="upload">📤 上传文件</div>
<div class="tab" data-tab="adjust">🎯 调整排名</div>
<div class="tab" data-tab="result">✅ 查看结果</div>
</div>

<div id="tab-upload" class="tab-content active">
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<h2 style="color:#667eea">📁 点击上传Excel文件</h2>
<p style="color:#666">支持 .xlsx 格式</p>
</div>
<input type="file" id="fileInput" accept=".xlsx" style="display:none">
<div id="status1"></div>
</div>

<div id="tab-adjust" class="tab-content">
<div id="status2"></div>
<div id="statsInfo"></div>
<div id="adjustTable"></div>
<div style="margin-top:20px;text-align:center;display:none" id="actionButtons">
<button class="btn btn-success" onclick="executeAdjustment()">🎯 执行智能调整</button>
<button class="btn" onclick="autoFillCurrentRank()">⚡ 按当前排名填充</button>
<button class="btn" onclick="clearAllTargets()">清空所有</button>
</div>
</div>

<div id="tab-result" class="tab-content">
<div id="status3"></div>
<div id="resultSummary"></div>
<div id="resultTable"></div>
<div id="downloadSection" class="download-section">
<h3 style="margin-bottom:15px;color:#155724">✅ 调整完成！</h3>
<button class="btn btn-success" onclick="exportResult()" style="font-size:16px;padding:15px 30px">
📥 下载修改后的Excel文件
</button>
</div>
</div>
</div>

<script>
let wb=null,ws=null,data=null;
let students=[],mods=[],adjustmentResults=[];
const COL_SEQ=0,COL_NAME=1,COL_TARGET=29,COL_INITIAL=27,COL_TOTAL=28;
const EXPERT_COLS=[2,6,10,14,18];
const SUBJECTS=['综合素质','面试','笔试','英语'];

// Tab切换
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    const tabName=this.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-'+tabName).classList.add('active');
  });
});

function showStatus(id,type,msg){
  const el=document.getElementById(id);
  if(el){el.className='status '+type;el.innerHTML=msg;}
}

// 文件上传
document.getElementById('fileInput').addEventListener('change',function(e){
  if(e.target.files.length>0)handleFile(e.target.files[0]);
});

function handleFile(file){
  showStatus('status1','info','正在读取文件...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data_array=new Uint8Array(e.target.result);
      wb=XLSX.read(data_array,{type:'array'});
      ws=wb.Sheets[wb.SheetNames[0]];
      data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      parseData();
      if(students.length===0){
        showStatus('status1','error','❌ 未能识别学生数据');
        return;
      }
      showStatus('status1','success','✅ 成功加载 '+students.length+' 名学生数据');
      renderAdjustTable();
      // 切换到调整页面
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
      document.querySelector('[data-tab="adjust"]').classList.add('active');
      document.getElementById('tab-adjust').classList.add('active');
    }catch(err){
      showStatus('status1','error','❌ 读取失败: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseData(){
  students=[];
  for(let i=1;i<data.length;i++){
    const row=data[i];
    if(!row[COL_SEQ])continue;
    const scores={};
    for(let expIdx=0;expIdx<5;expIdx++){
      const colStart=EXPERT_COLS[expIdx];
      const expName='评委'+(expIdx+1);
      scores[expName]={};
      for(let subIdx=0;subIdx<4;subIdx++){
        const val=parseFloat(row[colStart+subIdx]);
        scores[expName][SUBJECTS[subIdx]]=isNaN(val)?0:val;
      }
    }
    let retestSum=0;
    for(let expIdx=0;expIdx<5;expIdx++){
      const expName='评委'+(expIdx+1);
      for(let subIdx=0;subIdx<4;subIdx++){
        retestSum+=scores[expName][SUBJECTS[subIdx]];
      }
    }
    const initialVal=parseFloat(row[COL_INITIAL]);
    const retestAvg=retestSum/20;
    const calcTotal=(isNaN(initialVal)?0:initialVal)/10+retestAvg/2;
    students.push({
      rowIndex:i,seq:String(row[COL_SEQ]),name:String(row[COL_NAME]||''),
      target:parseInt(row[COL_TARGET])||0,initial:isNaN(initialVal)?0:initialVal,
      retest:retestAvg,calcTotal:calcTotal,scores:scores
    });
  }
  students.sort((a,b)=>b.calcTotal-a.calcTotal);
  students.forEach((s,i)=>s.currentRank=i+1);
}

function renderAdjustTable(){
  const needAdjustCount=students.filter(s=>s.target>0&&s.target!==s.currentRank).length;
  const unchangedCount=students.filter(s=>s.target<=0||s.target===s.currentRank).length;
  document.getElementById('statsInfo').innerHTML=
    '<div class="status info">总人数: <b>'+students.length+'</b> 人 | '+
    '需要调整: <b style="color:#d39e00">'+needAdjustCount+'</b> 人 | '+
    '保持不变: <b style="color:#28a745">'+unchangedCount+'</b> 人</div>';
  
  let html='<h3 style="margin-bottom:15px">设置目标排名（点击单元格直接编辑）</h3>';
  html+='<table><tr><th>当前排名</th><th>序号</th><th>姓名</th><th>初试</th><th>复试均分</th><th>当前总分</th><th>目标排名</th><th>状态</th></tr>';
  
  students.forEach(s=>{
    const needAdjust=s.target>0&&s.target!==s.currentRank;
    const rowClass=needAdjust?'need-adjust':(s.target>0?'unchanged':'');
    let status='<span style="color:#999">未设置</span>';
    if(needAdjust)status='<span style="color:#d39e00;font-weight:bold">将调整</span>';
    else if(s.target>0)status='<span style="color:#28a745">✓ 保持</span>';
    
    html+='<tr class="'+rowClass+'">';
    html+='<td>'+s.currentRank+'</td><td>'+s.seq+'</td><td><b>'+s.name+'</b></td>';
    html+='<td>'+s.initial.toFixed(1)+'</td><td>'+s.retest.toFixed(2)+'</td>';
    html+='<td>'+s.calcTotal.toFixed(4)+'</td>';
    html+='<td><input type="number" class="target-input" data-seq="'+s.seq+'" value="'+(s.target||'')+'" min="1" onchange="updateTarget(this)" placeholder="输入排名"></td>';
    html+='<td id="status-'+s.seq+'">'+status+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('adjustTable').innerHTML=html;
  document.getElementById('actionButtons').style.display='block';
  showStatus('status2','info','请在"目标排名"列输入期望的排名，然后点击"执行智能调整"');
}

function updateTarget(input){
  const seq=input.getAttribute('data-seq');
  const newTarget=parseInt(input.value)||0;
  const student=students.find(s=>s.seq===seq);
  if(student){
    student.target=newTarget;
    const needAdjust=newTarget>0&&newTarget!==student.currentRank;
    const statusCell=document.getElementById('status-'+seq);
    const row=input.closest('tr');
    if(needAdjust){
      statusCell.innerHTML='<span style="color:#d39
