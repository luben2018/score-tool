<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩协调工具-智能加权版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center}
.nav{display:flex;background:#f8f9fa;border-bottom:1px solid #e9ecef}
.nav-item{flex:1;padding:15px;text-align:center;cursor:pointer}
.nav-item.active{color:#667eea;border-bottom:3px solid #667eea;background:white}
.section{padding:30px;display:none}
.section.active{display:block}
.btn{background:#667eea;color:white;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.btn-success{background:#28a745}
.btn-secondary{background:#6c757d}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#667eea;color:white}
.status{padding:15px;border-radius:8px;margin:15px 0}
.status.success{background:#d4edda;color:#155724}
.status.error{background:#f8d7da;color:#721c24}
.status.info{background:#d1ecf1;color:#0c5460}
.status.warning{background:#fff3cd;color:#856404}
.upload-area{border:3px dashed #667eea;border-radius:12px;padding:50px;text-align:center;background:#f0f4ff;cursor:pointer;margin:20px 0}
.target-input{width:70px;padding:8px;text-align:center;border:2px solid #ced4da;border-radius:4px;font-weight:bold}
.target-input.changed{border-color:#28a745;background:#d4edda}
.modified{background:#ffebee!important;color:#c62828!important;font-weight:bold}
.will-adjust{background:#fff3cd!important}
.keep{background:#e8f5e9!important}
.download-section{display:none;padding:20px;background:#d4edda;border-radius:8px;text-align:center;margin-top:20px}
.download-section.show{display:block}
.simulation-box{background:#f0f4ff;border:2px solid #667eea;border-radius:8px;padding:15px;margin:15px 0}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🎓 成绩协调工具-智能加权版</h1></div>
<div class="nav">
<div class="nav-item active" onclick="showPage('upload')">1️⃣ 上传文件</div>
<div class="nav-item" onclick="showPage('adjust')">2️⃣ 设置目标排名</div>
<div class="nav-item" onclick="showPage('preview')">3️⃣ 预览调整</div>
<div class="nav-item" onclick="showPage('result')">4️⃣ 查看结果</div>
</div>

<div id="page-upload" class="section active">
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<h2 style="color:#667eea">📁 点击上传Excel文件</h2>
<p>支持 .xlsx 格式</p>
</div>
<input type="file" id="fileInput" accept=".xlsx" style="display:none">
<div id="msg-upload"></div>
</div>

<div id="page-adjust" class="section">
<div id="msg-adjust"></div>
<div id="stats-adjust"></div>
<div id="table-adjust"></div>
<div style="margin-top:20px;text-align:center">
<button class="btn btn-success" onclick="showPreview()">👁️ 预览调整效果</button>
<button class="btn btn-secondary" onclick="fillCurrentRank()">⚡ 按当前排名填充</button>
<button class="btn btn-secondary" onclick="clearAllTargets()">清空所有</button>
</div>
</div>

<div id="page-preview" class="section">
<div id="msg-preview"></div>
<div id="simulation-result"></div>
<div style="margin-top:20px;text-align:center">
<button class="btn btn-success" onclick="executeAdjustment()">✅ 确认执行调整</button>
<button class="btn btn-secondary" onclick="showPage('adjust')">⬅️ 返回修改</button>
</div>
</div>

<div id="page-result" class="section">
<div id="msg-result"></div>
<div id="result-table"></div>
<div id="download-box" class="download-section">
<h3 style="color:#155724">✅ 调整完成！</h3>
<button class="btn btn-success" onclick="downloadFile()">📥 下载修改后的Excel</button>
</div>
</div>
</div>

<script>
var wb=null,ws=null,data=null;
var students=[],mods=[],results=[],simulationResults=[];
var COL_SEQ=0,COL_NAME=1,COL_EXPERT1=2,COL_EXPERT2=6,COL_EXPERT3=10,COL_EXPERT4=14,COL_EXPERT5=18;
var COL_RETEST_FINAL=26,COL_INITIAL=27,COL_TOTAL=28,COL_TARGET=29;
var EXPERT_COLS=[COL_EXPERT1,COL_EXPERT2,COL_EXPERT3,COL_EXPERT4,COL_EXPERT5];
var SUBJECTS=['综合素质','面试','笔试','英语'];
var WEIGHTS=[0.1,0.3,0.4,0.2];

function round2(val){return Math.round((val+1e-10)*100)/100;}

function calcRetest(scores){
var subjAvgs=[];
for(var subj=0;subj<4;subj++){
var sum=0;
for(var e=0;e<5;e++)sum+=scores[e*4+subj];
subjAvgs.push(round2(sum/5));
}
var retest=round2(subjAvgs[0]*WEIGHTS[0]+subjAvgs[1]*WEIGHTS[1]+subjAvgs[2]*WEIGHTS[2]+subjAvgs[3]*WEIGHTS[3]);
return {retest:retest,subjAvgs:subjAvgs};
}

function calcTotal(initial,retest){return round2(initial/10+retest/2);}

function showPage(name){
document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
document.getElementById('page-'+name).classList.add('active');
var idx={'upload':0,'adjust':1,'preview':2,'result':3}[name];
if(idx>=0)document.querySelectorAll('.nav-item')[idx].classList.add('active');
}

function showMsg(id,type,msg){
var el=document.getElementById(id);
if(el){el.className='status '+type;el.innerHTML=msg;}
}

document.getElementById('fileInput').addEventListener('change',function(e){
if(e.target.files.length>0)loadFile(e.target.files[0]);
});

function loadFile(file){
showMsg('msg-upload','info','正在读取文件...');
var reader=new FileReader();
reader.onload=function(e){
try{
var arr=new Uint8Array(e.target.result);
wb=XLSX.read(arr,{type:'array'});
ws=wb.Sheets[wb.SheetNames[0]];
data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
parseStudents();
if(students.length===0){showMsg('msg-upload','error','❌ 未能识别学生数据');return;}
showMsg('msg-upload','success','✅ 成功加载 '+students.length+' 名学生');
renderAdjustPage();
setTimeout(function(){showPage('adjust');},300);
}catch(err){showMsg('msg-upload','error','❌ 读取失败: '+err.message);}
};
reader.readAsArrayBuffer(file);
}

function parseStudents(){
students=[];
if(!data||data.length<2)return;

// 第一遍：读取所有学生数据（不排序）
// 【关键修复】使用姓名列判断，避免序号列为空导致跳过
for(var i=1;i<data.length;i++){
var row=data[i];
if(!row)continue;

// 检查姓名列是否存在（更可靠的判断）
var name=row[COL_NAME];
if(name===''||name===undefined||name===null)continue;

var rawScores=[];
for(var e=0;e<5;e++){
var start=EXPERT_COLS[e];
for(var subj=0;subj<4;subj++){
rawScores.push(parseFloat(row[start+subj])||0);
}
}

var retestFinal=parseFloat(row[COL_RETEST_FINAL])||0;
var initial=parseFloat(row[COL_INITIAL])||0;
var total=parseFloat(row[COL_TOTAL])||0;

// 读取目标排序
var fileTarget=row[COL_TARGET];
var target=0;
if(fileTarget!==''&&fileTarget!==undefined&&fileTarget!==null){
var strVal=String(fileTarget).trim();
var parsed=parseFloat(strVal);
if(!isNaN(parsed)&&parsed>0){
target=Math.round(parsed);
}
}

students.push({
rowIndex:i,
seq:String(row[COL_SEQ]||''),
name:String(name),
rawScores:rawScores,
retestFinal:retestFinal,
initial:initial,
total:total,
fileTarget:target,
target:target,
id:i
});
}

// 按总成绩降序排序
students.sort(function(a,b){return b.total-a.total;});

// 设置排名和默认值
for(var i=0;i<students.length;i++){
students[i].currentRank=i+1;
if(students[i].target===0){
students[i].target=students[i].currentRank;
}
}
}

function renderAdjustPage(){
var willAdjust=0,fileTargetCount=0;
for(var i=0;i<students.length;i++){
if(students[i].target!==students[i].currentRank)willAdjust++;
if(students[i].fileTarget>0)fileTargetCount++;
}

var statsHtml='<div class="status info">';
statsHtml+='总人数: <b>'+students.length+'</b> | ';
statsHtml+='文件中有目标: <b style="color:#2196f3">'+fileTargetCount+'</b> | ';
statsHtml+='将调整: <b style="color:#d39e00">'+willAdjust+'</b> | ';
statsHtml+='保持: <b style="color:#28a745">'+(students.length-willAdjust)+'</b>';
statsHtml+='</div>';
document.getElementById('stats-adjust').innerHTML=statsHtml;

var html='<table><tr><th>当前排名</th><th>序号</th><th>姓名</th><th>初试</th><th>复试成绩</th><th>总成绩</th><th>目标排名</th><th>状态</th></tr>';

for(var i=0;i<students.length;i++){
var s=students[i];
var willChange=s.target!==s.currentRank;
var rowClass=willChange?'will-adjust':'keep';

var statusText='';
if(s.fileTarget>0){
statusText='<span style="color:#2196f3">目标:'+s.target+'</span>';
if(willChange){
statusText+=' <span style="color:#d39e00">(将调整)</span>';
}else{
statusText+=' <span style="color:#28a745">(已匹配)</span>';
}
}else{
statusText='<span style="color:#999">默认:'+s.target+'</span>';
if(willChange){
statusText+=' <span style="color:#d39e00">(将调整)</span>';
}else{
statusText+=' <span style="color:#28a745">(保持)</span>';
}
}

html+='<tr class="'+rowClass+'">';
html+='<td>'+s.currentRank+'</td>';
html+='<td>'+s.seq+'</td>';
html+='<td><b>'+s.name+'</b></td>';
html+='<td>'+s.initial.toFixed(0)+'</td>';
html+='<td>'+s.retestFinal.toFixed(2)+'</td>';
html+='<td>'+s.total.toFixed(2)+'</td>';
html+='<td><input type="number" class="target-input" id="target-'+s.seq+'" value="'+s.target+'" min="1" max="'+students.length+'" onchange="onTargetChange('+i+')"></td>';
html+='<td>'+statusText+'</td>';
html+='</tr>';
}
html+='</table>';
document.getElementById('table-adjust').innerHTML=html;
showMsg('msg-adjust','info','已按总成绩降序排列。蓝色=文件有目标，灰色=使用默认。');
}

function onTargetChange(studentIdx){
var s=students[studentIdx];
var input=document.getElementById('target-'+s.seq);
var newTarget=parseInt(input.value)||0;
s.target=newTarget;
s.fileTarget=newTarget;
var willChange=newTarget!==s.currentRank;
var row=input.closest('tr');

if(willChange){
row.className='will-adjust';
input.classList.add('changed');
}else{
row.className='keep';
input.classList.remove('changed');
}

var statusCell=row.cells[7];
if(statusCell){
var statusText='<span style="color:#2196f3">目标:'+s.target+'</span>';
if(willChange){
statusText+=' <span style="color:#d39e00">(将调整)</span>';
}else{
statusText+=' <span style="color:#28a745">(已匹配)</span>';
}
statusCell.innerHTML=statusText;
}

updateStats();
}

function updateStats(){
var willAdjust=0,fileTargetCount=0;
for(var i=0;i<students.length;i++){
if(students[i].target!==students[i].currentRank)willAdjust++;
if(students[i].fileTarget>0)fileTargetCount++;
}
var statsHtml='<div class="status info">';
statsHtml+='总人数: <b>'+students.length+'</b> | ';
statsHtml+='文件中有目标: <b style="color:#2196f3">'+fileTargetCount+'</b> | ';
statsHtml+='将调整: <b style="color:#d39e00">'+willAdjust+'</b> | ';
statsHtml+='保持: <b style="color:#28a745">'+(students.length-willAdjust)+'</b>';
statsHtml+='</div>';
document.getElementById('stats-adjust').innerHTML=statsHtml;
}

function fillCurrentRank(){
for(var i=0;i<students.length;i++){
var s=students[i];
s.target=s.currentRank;
s.fileTarget=s.currentRank;
var input=document.getElementById('target-'+s.seq);
if(input){
input.value=s.currentRank;
input.classList.remove('changed');
}
var row=input?input.closest('tr'):null;
if(row)row.className='keep';
}
updateStats();
}

function clearAllTargets(){
for(var i=0;i<students.length;i++){
var s=students[i];
s.target=0;
s.fileTarget=0;
var input=document.getElementById('target-'+s.seq);
if(input){
input.value='';
input.classList.remove('changed');
}
var row=input?input.closest('tr'):null;
if(row)row.className='';
}
updateStats();
}

function findSmartAdjustment(s,targetRank,allStudents){
var initial=s.initial;
var rawScores=s.rawScores.slice();
var currentTotal=s.total;
var currentRank=s.currentRank;

var sorted=allStudents.slice().sort(function(a,b){return b.total-a.total;});
var higherStudent=null,lowerStudent=null;

for(var i=0;i<sorted.length;i++){
if(sorted[i].id===s.id)continue;
var rank=i+1;
if(rank===targetRank-1)higherStudent=sorted[i];
if(rank===targetRank)lowerStudent=sorted[i];
}

var minTotal,maxTotal;
if(targetRank===1){
minTotal=lowerStudent?lowerStudent.total+0.01:currentTotal+0.01;
maxTotal=100;
}else if(!higherStudent){
minTotal=lowerStudent?lowerStudent.total+0.01:currentTotal+0.01;
maxTotal=currentTotal+10;
}else{
minTotal=lowerStudent?lowerStudent.total+0.005:currentTotal+0.01;
maxTotal=higherStudent.total-0.005;
}

if(minTotal>=maxTotal){
minTotal=lowerStudent?lowerStudent.total+0.001:currentTotal+0.01;
maxTotal=higherStudent?higherStudent.total-0.001:minTotal+1;
}

var bestResult=null,bestError=Infinity;
var strategies=[
{name:'笔试',subjects:[2]},
{name:'笔试+面试',subjects:[2,1]},
{name:'笔试+面试+英语',subjects:[2,1,3]},
{name:'全部科目',subjects:[0,1,2,3]}
];

for(var stratIdx=0;stratIdx<strategies.length;stratIdx++){
var strategy=strategies[stratIdx];
var result=tryStrategy(s,strategy.subjects,minTotal,maxTotal,currentRank<targetRank);

if(result.success){
var error=Math.abs(result.newTotal-currentTotal);
var strategyPenalty=strategy.subjects.length*0.001;
var score=error+strategyPenalty;

if(score<bestError){
bestError=score;
bestResult=result;
bestResult.strategy=strategy.name;
}
}
}

return bestResult||{success:false};
}

function tryStrategy(s,subjectsToAdjust,minTotal,maxTotal,isLowering){
var initial=s.initial;
var rawScores=s.rawScores.slice();
var currentTotal=s.total;

var bestDelta=null,bestNewScores=null,bestNewTotal=null,bestModifiedCount=Infinity;
var deltaRange=isLowering?[-5,-4,-3,-2,-1]:[1,2,3,4,5];

for(var dIdx=0;dIdx<deltaRange.length;dIdx++){
var delta=deltaRange[dIdx];

for(var numExperts=1;numExperts<=5;numExperts++){
var newScores=rawScores.slice();
var valid=true;
var modifiedCount=0;

for(var sIdx=0;sIdx<subjectsToAdjust.length;sIdx++){
var subj=subjectsToAdjust[sIdx];

for(var e=0;e<numExperts;e++){
var idx=e*4+subj;
var newScore=Math.round(rawScores[idx])+delta;
if(newScore<60||newScore>100){valid=false;break;}
newScores[idx]=newScore;
if(newScore!==Math.round(rawScores[idx]))modifiedCount++;
}
if(!valid)break;
}

if(!valid)continue;

var retestResult=calcRetest(newScores);
var newTotal=calcTotal(initial,retestResult.retest);

if(newTotal>=minTotal&&newTotal<=maxTotal){
if(modifiedCount<bestModifiedCount||(modifiedCount===bestModifiedCount&&Math.abs(newTotal-currentTotal)<Math.abs(bestNewTotal-currentTotal))){
bestModifiedCount=modifiedCount;
bestDelta=delta;
bestNewScores=newScores;
bestNewTotal=newTotal;
}
}
}
}

if(bestDelta!==null){
return{
success:true,
delta:bestDelta,
newScores:bestNewScores,
newTotal:bestNewTotal,
modifiedCount:bestModifiedCount
};
}

return{success:false};
}

function simulateNewRanking(){
for(var i=0;i<students.length;i++){
var s=students[i];
var input=document.getElementById('target-'+s.seq);
s.target=input?parseInt(input.value)||0:0;
}

var simStudents=students.map(function(s){
return{
id:s.id,
name:s.name,
currentRank:s.currentRank,
target:s.target,
total:s.total,
initial:s.initial,
rawScores:s.rawScores.slice()
};
});

var toAdjust=simStudents.filter(function(s){
return s.target>0&&s.target!==s.currentRank;
});

if(toAdjust.length===0)return{success:false,message:'没有需要调整的学生'};

toAdjust.sort(function(a,b){
return Math.abs(a.target-a.currentRank)-Math.abs(b.target-b.currentRank);
});

simulationResults=[];
var adjustedIds={};
var maxIterations=toAdjust.length*5;
var iteration=0;

while(iteration<maxIterations){
iteration++;
var processedInThisRound=0;

for(var i=0;i<toAdjust.length;i++){
var s=toAdjust[i];
if(adjustedIds[s.id])continue;

var result=findSmartAdjustment(s,s.target,simStudents);

if(result.success){
s.newTotal=result.newTotal;
s.delta=result.delta;
s.newScores=result.newScores;
s.strategy=result.strategy;
adjustedIds[s.id]=true;
processedInThisRound++;

simulationResults.push({
student:s,
delta:result.delta,
newTotal:result.newTotal,
newScores:result.newScores,
strategy:result.strategy,
modifiedCount:result.modifiedCount
});

for(var j=0;j<simStudents.length;j++){
if(simStudents[j].id===s.id){
simStudents[j].total=result.newTotal;
break;
}
}
}
}

if(processedInThisRound===0)break;
}

var failed=toAdjust.filter(function(s){return!adjustedIds[s.id];});

return{
success:simulationResults.length>0,
results:simulationResults,
failed:failed,
simStudents:simStudents
};
}

function showPreview(){
for(var i=0;i<students.length;i++){
var s=students[i];
var input=document.getElementById('target-'+s.seq);
s.target=input?parseInt(input.value)||0:0;
}

var sim=simulateNewRanking();

if(!sim.success){
showMsg('msg-preview','warning','⚠️ '+sim.message);
showPage('preview');
return;
}

var html='<div class="simulation-box">';
html+='<h3>📊 调整预览</h3>';
html+='<p>将调整 <b>'+sim.results.length+'</b> 名学生</p>';

if(sim.failed.length>0){
html+='<div class="status warning">⚠️ 以下学生无法调整：';
for(var i=0;i<sim.failed.length;i++){
html+=sim.failed[i].name+' ';
}
html+='</div>';
}

html+='<table><tr><th>姓名</th><th>原排名</th><th>目标排名</th><th>原总分</th><th>新总分</th><th>策略</th><th>修改数</th></tr>';
for(var i=0;i<sim.results.length;i++){
var r=sim.results[i];
html+='<tr><td><b>'+r.student.name+'</b></td><td>'+r.student.currentRank+'</td><td><b>'+r.student.target+'</b></td><td>'+r.student.total.toFixed(2)+'</td><td><b>'+r.newTotal.toFixed(2)+'</b></td><td>'+r.strategy+'</td><td>'+r.modifiedCount+'个</td></tr>';
}
html+='</table></div>';

var newRanking=sim.simStudents.slice().sort(function(a,b){return b.total-a.total;});
html+='<div class="simulation-box"><h3>🏆 新排名预览</h3>';
html+='<table><tr><th>新排名</th><th>姓名</th><th>新总分</th><th>目标</th><th>实际</th><th>状态</th></tr>';
for(var i=0;i<newRanking.length;i++){
var s=newRanking[i];
var actualRank=i+1;
var targetStr=s.target?s.target:'-';
var status='';

if(s.target&&s.target!==s.currentRank){
if(actualRank===s.target){
status='<span style="color:#28a745;font-weight:bold">✓ 达标</span>';
}else{
var diff=Math.abs(actualRank-s.target);
status='<span style="color:#d39e00">差'+diff+'名</span>';
}
}else{
status='-';
}

html+='<tr><td>'+actualRank+'</td><td>'+s.name+'</td><td>'+s.total.toFixed(2)+'</td><td>'+targetStr+'</td><td><b>'+actualRank+'</b></td><td>'+status+'</td></tr>';
}
html+='</table></div>';

document.getElementById('simulation-result').innerHTML=html;
showMsg('msg-preview','success','✅ 预览完成');
showPage('preview');
}

function executeAdjustment(){
var sim=simulateNewRanking();

if(!sim.success||sim.results.length===0){
showMsg('msg-result','error','❌ 没有可执行的调整');
showPage('result');
return;
}

mods=[];results=[];
var finalRanking=sim.simStudents.slice().sort(function(a,b){return b.total-a.total;});

for(var i=0;i<sim.results.length;i++){
var simResult=sim.results[i];
var s=simResult.student;
var delta=simResult.delta;
var newTotal=simResult.newTotal;

var originalStudent=null;
for(var j=0;j<students.length;j++){
if(students[j].id===s.id){
originalStudent=students[j];
break;
}
}
if(!originalStudent)continue;

var actualRank=-1;
for(var r=0;r<finalRanking.length;r++){
if(finalRanking[r].id===s.id){
actualRank=r+1;
break;
}
}

var newScores=simResult.newScores||[];
if(newScores.length===0){
for(var k=0;k<20;k++){
newScores.push(Math.round(originalStudent.rawScores[k])+delta);
}
}

results.push({
student:originalStudent,
targetRank:originalStudent.target,
currentRank:originalStudent.currentRank,
actualRank:actualRank,
newTotal:newTotal,
delta:delta,
strategy:simResult.strategy
});

for(var e=0;e<5;e++){
var expName='面试官'+(e+1);
for(var subj=0;subj<4;subj++){
var idx=e*4+subj;
var oldVal=Math.round(originalStudent.rawScores[idx]);
var newVal=Math.round(newScores[idx]);
if(oldVal!==newVal){
mods.push({
student:originalStudent.name,
expert:expName,
subject:SUBJECTS[subj],
old:oldVal,
new:newVal,
delta:newVal-oldVal
});
}
}
}

for(var e=0;e<5;e++){
var colStart=EXPERT_COLS[e];
for(var subj=0;subj<4;subj++){
var colIdx=colStart+subj;
var cellRef=XLSX.utils.encode_cell({r:originalStudent.rowIndex,c:colIdx});
ws[cellRef]={v:Math.round(newScores[e*4+subj]),t:'n'};
}
}
}

for(var i=0;i<students.length;i++){
var s=students[i];
var targetCell=XLSX.utils.encode_cell({r:s.rowIndex,c:COL_TARGET});
ws[targetCell]={v:s.target,t:'n'};

var actualRankCell=XLSX.utils.encode_cell({r:s.rowIndex,c:COL_TARGET+1});
var actualRank=-1;
for(var r=0;r<finalRanking.length;r++){
if(finalRanking[r].id===s.id){
actualRank=r+1;
break;
}
}
ws[actualRankCell]={v:actualRank,t:'n'};
}

var targetHeader=XLSX.utils.encode_cell({r:0,c:COL_TARGET});
var actualHeader=XLSX.utils.encode_cell({r:0,c:COL_TARGET+1});
ws[targetHeader]={v:'目标排序',t:'s'};
ws[actualHeader]={v:'实际排序',t:'s'};

showResultPage(results.length);
}

function showResultPage(modifiedCount){
var html='<h3>调整结果汇总</h3><p>成功修改 <b>'+modifiedCount+'</b> 名学生 | 修改单元格: <b>'+mods.length+'</b> 个</p>';

if(results.length>0){
html+='<table><tr><th>姓名</th><th>原排名</th><th>目标排名</th><th>实际排名</th><th>原总分</th><th>新总分</th><th>策略</th><th>修改数</th></tr>';
for(var i=0;i<results.length;i++){
var r=results[i];
var rankStatus=r.actualRank===r.targetRank?'<span style="color:#28a745">✓</span>':'<span style="color:#d39e00">差'+Math.abs(r.actualRank-r.targetRank)+'</span>';
html+='<tr><td><b>'+r.student.name+'</b></td><td>'+r.currentRank+'</td><td><b>'+r.targetRank+'</b></td><td>'+r.actualRank+' '+rankStatus+'</td><td>'+r.student.total.toFixed(2)+'</td><td><b>'+r.newTotal.toFixed(2)+'</b></td><td>'+r.strategy+'</td><td>'+(mods.filter(function(m){return m.student===r.student.name;}).length)+'个</td></tr>';
}
html+='</table>';
}

if(mods.length>0){
html+='<h3>面试官打分修改明细</h3><table><tr><th>学生</th><th>面试官</th><th>科目</th><th>原分数</th><th>新分数</th><th>变化</th></tr>';
var byStudent={};
for(var i=0;i<mods.length;i++){
var m=mods[i];
if(!byStudent[m.student])byStudent[m.student]=[];
byStudent[m.student].push(m);
}
for(var name in byStudent){
var mlist=byStudent[name];
for(var i=0;i<mlist.length;i++){
var m=mlist[i];
var deltaStr=m.delta>0?'+'+m.delta:m.delta;
html+='<tr'+(i===0?' style="border-top:2px solid #667eea"':'')+'><td>'+(i===0?name:'')+'</td><td>'+m.expert+'</td><td>'+m.subject+'</td><td>'+m.old+'</td><td class="modified">'+m.new+'</td><td>'+deltaStr+'</td></tr>';
}
}
html+='</table>';
}

document.getElementById('result-table').innerHTML=html;
document.getElementById('download-box').classList.add('show');
showMsg('msg-result','success','✅ 调整完成！');
showPage('result');
}

function downloadFile(){
if(!wb||mods.length===0){alert('没有可导出的数据');return;}
var modData=[['修改记录'],['生成时间',new Date().toLocaleString()],['修改学生数',results.length],['修改单元格数',mods.length],[],['学生','面试官','科目','原分数','新分数','变化']];
for(var i=0;i<mods.length;i++){
var m=mods[i];
modData.push([m.student,m.expert,m.subject,m.old,m.new,m.delta]);
}
var modWs=XLSX.utils.aoa_to_sheet(modData);
wb.SheetNames.push('修改记录');
wb.Sheets['修改记录']=modWs;
XLSX.writeFile(wb,'成绩单_已调整.xlsx');
showMsg('msg-result','success','✅ 文件已下载！');
}
</script>
