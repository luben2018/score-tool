<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩协调工具-精准调整版</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;padding:30px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center;border-radius:16px 16px 0 0;margin:-30px -30px 30px}
.btn{background:#667eea;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.btn-success{background:#28a745}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#667eea;color:white}
.tab{display:inline-block;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{border-bottom-color:#667eea;color:#667eea;font-weight:bold}
.tab-content{display:none;padding:20px 0}
.tab-content.active{display:block}
.status{padding:15px;border-radius:8px;margin:15px 0;font-size:14px}
.status.success{background:#d4edda;color:#155724}
.status.error{background:#f8d7da;color:#721c24}
.status.info{background:#d1ecf1;color:#0c5460}
.upload-area{border:2px dashed #667eea;border-radius:12px;padding:40px;text-align:center;background:#f0f4ff;cursor:pointer;margin:20px 0}
input[type=number]{width:70px;padding:5px;text-align:center;border:1px solid #ccc;border-radius:4px}
.modified{background:#ffcccc!important;color:#cc0000!important;font-weight:bold}
.need-adjust{background:#fff3cd}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎓 成绩协调工具（精准调整版）</h1>
<p>只修改需要调整排名的学生，其他人保持不变</p>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('upload')">📤 上传</div>
<div class="tab" onclick="switchTab('adjust')">🎯 调整</div>
<div class="tab" onclick="switchTab('result')">✅ 结果</div>
</div>

<div id="tab-upload" class="tab-content active">
<div class="upload-area" onclick="document.getElementById('f').click()">
<h2>📁 点击上传Excel</h2>
<p>评委打分：列2-21，目标排名：列29</p>
</div>
<input type="file" id="f" accept=".xlsx" style="display:none" onchange="handleFile(event)">
<div id="s1"></div>
</div>

<div id="tab-adjust" class="tab-content">
<div id="s2"></div>
<div id="stats"></div>
<div id="adjustUI"></div>
</div>

<div id="tab-result" class="tab-content">
<button class="btn btn-success" onclick="exportResult()">📥 下载修改后的Excel</button>
<div id="s3"></div>
<div id="resultTable"></div>
</div>
</div>

<script>
let wb=null,ws=null,data=null;
let students=[],mods=[],needAdjustList=[];

const COL_SEQ=0, COL_NAME=1, COL_TARGET=29, COL_INITIAL=27, COL_TOTAL=28;
const EXPERT_COLS=[2,6,10,14,18];
const SUB=['综合素质','面试','笔试','英语'];

function switchTab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+id).classList.add('active');
}
function show(id,type,msg){
const el=document.getElementById(id);
el.className='status '+type;
el.innerHTML=msg;
}

function handleFile(e){
const file=e.target.files[0];
if(!file)return;
show('s1','info','读取中...');

const r=new FileReader();
r.onload=function(e){
try{
const d=new Uint8Array(e.target.result);
wb=XLSX.read(d,{type:'array'});
ws=wb.Sheets[wb.SheetNames[0]];
data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

parse();

if(students.length===0){
show('s1','error','未能识别学生数据');
return;
}

show('s1','success','✅ 成功加载 '+students.length+' 人数据');
renderUI();

}catch(err){
show('s1','error','❌ 错误:'+err.message);
}
};
r.readAsArrayBuffer(file);
}

function parse(){
students=[];
if(!data||data.length<2)return;

for(let i=1;i<data.length;i++){
const row=data[i];
if(!row[COL_SEQ])continue;

const scores={};
EXPERT_COLS.forEach((colStart,idx)=>{
const expName='评委'+(idx+1);
scores[expName]={};
SUB.forEach((sub,j)=>{
const val=parseFloat(row[colStart+j]);
scores[expName][sub]=isNaN(val)?0:val;
});
});

const initialVal=parseFloat(row[COL_INITIAL]);
const targetVal=parseInt(row[COL_TARGET])||0;

const student={
rowIndex:i,
seq:String(row[COL_SEQ]),
name:String(row[COL_NAME]||''),
target:targetVal,
initial:isNaN(initialVal)?0:initialVal,
total:parseFloat(row[COL_TOTAL])||0,
scores:scores
};

let retestSum=0;
EXPERT_COLS.forEach((colStart,idx)=>{
SUB.forEach((sub,j)=>{
retestSum+=student.scores['评委'+(idx+1)][sub];
});
});
student.retest=retestSum/20;
student.calcTotal=student.initial/10+student.retest/2;

students.push(student);
}
}

function renderUI(){
if(students.length===0)return;

const ranked=[...students].sort((a,b)=>b.calcTotal-a.calcTotal);
ranked.forEach((s,i)=>s.currentRank=i+1);

needAdjustList=students.filter(s=>s.target>0&&s.target!==s.currentRank);
const unchangedList=students.filter(s=>s.target<=0||s.target===s.currentRank);

document.getElementById('stats').innerHTML=
'<div class="status info">'+
'总人数: <b>'+students.length+'</b> | '+
'需要调整: <b style="color:#d39e00">'+needAdjustList.length+'</b>人 | '+
'保持不变: <b style="color:#28a745">'+unchangedList.length+'</b>人'+
'</div>';

let html='<h3>设置目标排名（黄色行表示需要调整）</h3>';
html+='<table><tr><th>当前排名</th><th>序号</th><th>姓名</th><th>初试</th><th>复试均分</th><th>当前总分</th><th>目标排名</th><th>状态</th></tr>';

ranked.forEach(s=>{
const needAdjust=s.target>0&&s.target!==s.currentRank;
const rowClass=needAdjust?'need-adjust':'';
const status=needAdjust?'<span style="color:#d39e00">需调整</span>':
(s.target>0?'<span style="color:#28a745">✓</span>':'<span style="color:#999">-</span>');

html+='<tr class="'+rowClass+'">';
html+='<td>'+s.currentRank+'</td>';
html+='<td>'+s.seq+'</td>';
html+='<td>'+s.name+'</td>';
html+='<td>'+s.initial+'</td>';
html+='<td>'+s.retest.toFixed(2)+'</td>';
html+='<td>'+s.calcTotal.toFixed(2)+'</td>';
html+='<td><input type="number" id="t-'+s.seq+'" value="'+(s.target||'')+'" min="1" style="width:60px"></td>';
html+='<td>'+status+'</td>';
html+='</tr>';
});

html+='</table>';
html+='<div style="margin-top:15px">';
html+='<button class="btn btn-success" onclick="doAdjust()">🎯 精准调整（仅修改必要人员）</button> ';
html+='<button class="btn" onclick="autoFill()">⚡ 按当前排名填充</button> ';
html+='<button class="btn" onclick="clearTargets()">清空目标</button>';
html+='</div>';

document.getElementById('adjustUI').innerHTML=html;
show('s2','success','请设置目标排名，系统将只修改需要调整的学生');
switchTab('adjust');
}

function autoFill(){
const ranked=[...students].sort((a,b)=>b.calcTotal-a.calcTotal);
ranked.forEach((s,i)=>{
const el=document.getElementById('t-'+s.seq);
if(el)el.value=i+1;
});
setTimeout(()=>{
students.forEach(s=>{
const el=document.getElementById('t-'+s.seq);
s.target=el?parseInt(el.value)||0:0;
});
renderUI();
},100);
}

function clearTargets(){
students.forEach(s=>{
const el=document.getElementById('t-'+s.seq);
if(el)el.value='';
});
setTimeout(()=>{
students.forEach(s=>s.target=0);
renderUI();
},100);
}

function doAdjust(){
mods=[];

students.forEach(s=>{
const el=document.getElementById('t-'+s.seq);
s.target=el?parseInt(el.value)||0:0;
});

const ranked=[...students].sort((a,b)=>b.calcTotal-a.calcTotal);
ranked.forEach((s,i)=>s.currentRank=i+1);

const needAdjust=students.filter(s=>s.target>0&&s.target!==s.currentRank);

if(needAdjust.length===0){
show('s2','success','✓ 没有需要调整的学生（目标排名与当前排名一致）');
return;
}

needAdjust.sort((a,b)=>a.target-b.target);

const results=[];
const minGap=0.01;

needAdjust.forEach((s,idx)=>{
let targetTotal;
const currentAtTarget=ranked.find(st=>st.currentRank===s.target);

if(currentAtTarget){
if(s.target<s.currentRank){
targetTotal=Math.max(currentAtTarget.calcTotal+minGap, s.calcTotal);
}else{
targetTotal=Math.min(currentAtTarget.calcTotal-minGap, s.calcTotal);
}
}else{
targetTotal=s.calcTotal+(s.currentRank-s.target)*0.5;
}

if(idx>0){
const prevResult=results[idx-1];
if(s.target===prevResult.target){
targetTotal=prevResult.targetTotal;
}else if(s.target<prevResult.target){
targetTotal=Math.max(targetTotal, prevResult.targetTotal+minGap);
}else{
targetTotal=Math.min(targetTotal, prevResult.targetTotal-minGap);
}
}

targetTotal=Math.max(60, Math.min(99, targetTotal));

const targetRetest=(targetTotal-s.initial/10)*2;
const factor=s.retest>0?targetRetest/s.retest:1;
const clampedFactor=Math.max(0.9, Math.min(1.1, factor));

results.push({
...s,
targetTotal:targetTotal,
targetRetest:targetRetest,
factor:clampedFactor
});
});

apply(results);
}

function apply(results){
mods=[];
let modifiedCount=0;

results.forEach(r=>{
const stu=students.find(s=>s.seq===r.seq);
if(!stu)return;

const rowIdx=stu.rowIndex;
let studentModified=false;

EXPERT_COLS.forEach((colStart,idx)=>{
const expName='评委'+(idx+1);
SUB.forEach((sub,j)=>{
const colIdx=colStart+j;
const cellRef=XLSX.utils.encode_cell({r:rowIdx,c:colIdx});
const oldVal=ws[cellRef]?ws[cellRef].v:0;

let newVal=70+(oldVal-70)*r.factor;
newVal=Math.max(60, Math.min(100, newVal));
newVal=Math.round(newVal*10)/10;

if(Math.abs(newVal-oldVal)>0.01){
mods.push({
row:rowIdx, col:colIdx,
old:oldVal, new:newVal,
student:r.name, exp:expName, sub:sub
});
ws[cellRef]={v:newVal, t:'n'};
studentModified=true;
}
});
});

if(studentModified)modifiedCount++;

const targetCell=XLSX.utils.encode_cell({r:rowIdx, c:COL_TARGET});
ws[targetCell]={v:r.target, t:'n'};
});

const lastCol=data[0].length;
ws[XLSX.utils.encode_cell({r:0,c:lastCol})]={v:'调整后复试分',t:'s'};
ws[XLSX.utils.encode_cell({r:0,c:lastCol+1})]={v:'调整后总分',t:'s'};
ws[XLSX.utils.encode_cell({r:0,c:lastCol+2})]={v:'调整后排名',t:'s'};

students.forEach(s=>{
const rowIdx=s.rowIndex;
let newRetest=0;
EXPERT_COLS.forEach((colStart,idx)=>{
SUB.forEach((sub,j)=>{
const cellRef=XLSX.utils.encode_cell({r:rowIdx,c:colStart+j});
newRetest+=ws[cellRef]?ws[cellRef].v:0;
});
});
newRetest=newRetest/20;
const newTotal=s.initial/10+newRetest/2;

ws[XLSX.utils.encode_cell({r:rowIdx,c:lastCol})]={v:parseFloat(newRetest.toFixed(2)),t:'n'};
ws[XLSX.utils.encode_cell({r:rowIdx,c:lastCol+1})]={v:parseFloat(newTotal.toFixed(2)),t:'n'};

const targetStudent=results.find(r=>r.seq===s.seq);
ws[XLSX.utils.encode_cell({r:rowIdx,c:lastCol+2})]={v:targetStudent?targetStudent.target:s.currentRank,t:'n'};
});

const range=XLSX.utils.decode_range(ws['!ref']);
range.e.c=Math.max(range.e.c,lastCol+2);
ws['!ref']=XLSX.utils.encode_range(range);

showResult(results, modifiedCount);
}

function showResult(results, modifiedCount){
const unchangedCount=students.length-results.length;

let html='<h3>调整结果</h3>';
html+='<div class="status success">';
html+='✅ 修改学生: <b>'+modifiedCount+'</b>人 | ';
html+='保持不变: <b>'+unchangedCount+'</b>人 | ';
html+='修改单元格: <b>'+mods.length+'</b>个';
html+='</div>';

if(results.length>0){
html+='<h4>调整详情</h4>';
html+='<table><tr><th>姓名</th><th>原排名</th><th>目标排名</th><th>原总分</th><th>新总分</th><th>调整幅度</th></tr>';

results.forEach(r=>{
const diff=r.targetTotal-r.calcTotal;
const diffClass=diff>0?'style="color:green"':(diff<0?'style="color:red"':'');
html+='<tr>';
html+='<td><b>'+r.name+'</b></td>';
html+='<td>'+r.currentRank+'</td>';
html+='<td><b>'+r.target+'</b></td>';
html+='<td>'+r.calcTotal.toFixed(2)+'</td>';
html+='<td><b>'+r.targetTotal.toFixed(2)+'</b></td>';
html+='<td '+diffClass+'>'+(diff>0?'+':'')+diff.toFixed(2)+'</td>';
html+='</tr>';
});
html+='</table>';
}

if(mods.length>0){
html+='<h4>分数修改明细</h4>';
html+='<table><tr><th>学生</th><th>评委</th><th>科目</th><th>原分数</th><th>新分数</th><th>变化</th></tr>';

const byStu={};
mods.forEach(m=>{
if(!byStu[m.student])byStu[m.student]=[];
byStu[m.student].push(m);
});

for(const[name,ms] of Object.entries(byStu)){
ms.forEach((m,i)=>{
const diff=m.new-m.old;
html+='<tr'+(i===0?' style="border-top:2px solid #667eea"':'')+'>';
html+='<td>'+(i===0?name:'')+'</td>';
html+='<td>'+m.exp+'</td>';
html+='<td>'+m.sub+'</td>';
html+='<td>'+m.old.toFixed(1)+'</td>';
html+='<td class="modified">'+m.new.toFixed(1)+'</td>';
html+='<td style="color:'+(diff>0?'green':'red')+'">'+(diff>0?'+':'')+diff.toFixed(1)+'</td>';
html+='</tr>';
});
}
html+='</table>';
}

document.getElementById('resultTable').innerHTML=html;
show('s3','success','✅ 调整完成！仅修改了'+modifiedCount+'名学生的成绩');
switchTab('result');
}

function exportResult(){
if(!wb||mods.length===0){alert('没有可导出的数据');return;}

const modData=[['修改记录'],['生成时间',new Date().toLocaleString()],['修改学生数',needAdjustList.length],['修改单元格数',mods.length],[],
['学生','评委','科目','原分数','新分数','变化']];

mods.forEach(m=>{
modData.push([m.student,m.exp,m.sub,m.old,m.new,(m.new-m.old).toFixed(2)]);
});

const modWs=XLSX.utils.aoa_to_sheet(modData);
wb.SheetNames.push('修改记录');
wb.Sheets['修改记录']=modWs;

XLSX.writeFile(wb,'成绩单_已调整.xlsx');
show('s3','success','✅ 已下载！');
}
</script>
</body>
</html>
