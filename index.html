<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩协调工具-可靠版</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:16px;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center}
.section{padding:30px;display:none}
.section.active{display:block}
.btn{background:#667eea;color:white;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.btn-success{background:#28a745}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:15px}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#667eea;color:white}
.status{padding:15px;border-radius:8px;margin:15px 0}
.status.success{background:#d4edda;color:#155724}
.status.error{background:#f8d7da;color:#721c24}
.status.info{background:#d1ecf1;color:#0c5460}
.upload-area{border:3px dashed #667eea;border-radius:12px;padding:50px;text-align:center;background:#f0f4ff;cursor:pointer;margin:20px 0}
.target-input{width:70px;padding:8px;text-align:center;border:2px solid #ced4da;border-radius:4px}
.modified{background:#ffebee!important;color:#c62828!important;font-weight:bold}
.need-adjust{background:#fff8e1!important}
.download-section{display:none;padding:20px;background:#d4edda;border-radius:8px;text-align:center;margin-top:20px}
.download-section.show{display:block}
.nav{margin:0;padding:0;background:#f8f9fa;display:flex;border-bottom:1px solid #e9ecef}
.nav-item{flex:1;padding:15px;text-align:center;cursor:pointer}
.nav-item.active{color:#667eea;border-bottom:3px solid #667eea;background:white}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎓 成绩协调工具（可靠版）</h1>
<p>列0=序号, 列1=姓名, 列2-21=评委1-5打分, 列27=初试, 列28=总成绩, 列29=目标排名</p>
</div>

<div class="nav">
<div class="nav-item active" id="nav-upload" onclick="showSection('upload')">📤 上传文件</div>
<div class="nav-item" id="nav-adjust" onclick="showSection('adjust')">🎯 调整排名</div>
<div class="nav-item" id="nav-result" onclick="showSection('result')">✅ 查看结果</div>
</div>

<div id="section-upload" class="section active">
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
<h2 style="color:#667eea">📁 点击上传Excel文件</h2>
<p style="color:#666">支持 .xlsx 格式</p>
</div>
<input type="file" id="fileInput" accept=".xlsx" style="display:none">
<div id="msg-upload"></div>
</div>

<div id="section-adjust" class="section">
<div id="msg-adjust"></div>
<div id="stats-adjust"></div>
<div id="table-adjust"></div>
<div style="margin-top:20px;text-align:center">
<button class="btn btn-success" onclick="doAdjust()">🎯 执行智能调整</button>
<button class="btn" onclick="fillCurrent()">⚡ 按当前排名填充</button>
<button class="btn" onclick="clearTargets()">清空所有</button>
</div>
</div>

<div id="section-result" class="section">
<div id="msg-result"></div>
<div id="table-result"></div>
<div id="download-box" class="download-section">
<h3 style="margin-bottom:15px;color:#155724">✅ 调整完成！</h3>
<button class="btn btn-success" onclick="downloadFile()" style="font-size:16px;padding:15px 30px">
📥 下载修改后的Excel
</button>
</div>
</div>
</div>

<script>
// 全局变量
var wb=null,ws=null,data=null;
var students=[],mods=[],results=[];
var COL_SEQ=0,COL_NAME=1,COL_TARGET=29,COL_INITIAL=27,COL_TOTAL=28;
var EXPERT_COLS=[2,6,10,14,18];
var SUBJECTS=['综合素质','面试','笔试','英语'];

// 切换页面
function showSection(name){
var sections=document.querySelectorAll('.section');
for(var i=0;i<sections.length;i++)sections[i].classList.remove('active');
var navs=document.querySelectorAll('.nav-item');
for(var i=0;i<navs.length;i++)navs[i].classList.remove('active');
document.getElementById('section-'+name).classList.add('active');
document.getElementById('nav-'+name).classList.add('active');
}

// 显示消息
function showMsg(id,type,msg){
var el=document.getElementById(id);
if(el){
el.className='status '+type;
el.innerHTML=msg;
}
}

// 文件上传
document.getElementById('fileInput').addEventListener('change',function(e){
if(e.target.files.length>0){
loadFile(e.target.files[0]);
}
});

function loadFile(file){
showMsg('msg-upload','info','正在读取文件...');
var reader=new FileReader();
reader.onload=function(e){
try{
var arr=new Uint8Array(e.target.result);
wb=XLSX.read(arr,{type:'array'});
ws=wb.Sheets[wb.SheetNames[0]];
data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
parseStudents();
if(students.length===0){
showMsg('msg-upload','error','❌ 未能识别学生数据');
return;
}
showMsg('msg-upload','success','✅ 成功加载 '+students.length+' 名学生');
renderTable();
setTimeout(function(){showSection('adjust');},500);
}catch(err){
showMsg('msg-upload','error','❌ 读取失败: '+err.message);
}
};
reader.readAsArrayBuffer(file);
}

function parseStudents(){
students=[];
if(!data||data.length<2)return;
for(var i=1;i<data.length;i++){
var row=data[i];
if(!row[COL_SEQ])continue;
var scores={};
for(var expIdx=0;expIdx<5;expIdx++){
var colStart=EXPERT_COLS[expIdx];
var expName='评委'+(expIdx+1);
scores[expName]={};
for(var subIdx=0;subIdx<4;subIdx++){
var val=parseFloat(row[colStart+subIdx]);
scores[expName][SUBJECTS[subIdx]]=isNaN(val)?0:val;
}
}
var retestSum=0;
for(var e=0;e<5;e++){
var en='评委'+(e+1);
for(var s=0;s<4;s++){
retestSum+=scores[en][SUBJECTS[s]];
}
}
var initialVal=parseFloat(row[COL_INITIAL]);
var retestAvg=retestSum/20;
var total=(isNaN(initialVal)?0:initialVal)/10+retestAvg/2;
students.push({
rowIndex:i,seq:String(row[COL_SEQ]),name:String(row[COL_NAME]||''),
target:parseInt(row[COL_TARGET])||0,initial:isNaN(initialVal)?0:initialVal,
retest:retestAvg,total:total,scores:scores
});
}
students.sort(function(a,b){return b.total-a.total;});
for(var i=0;i<students.length;i++)students[i].currentRank=i+1;
}

function renderTable(){
var needAdjust=0;
for(var i=0;i<students.length;i++){
if(students[i].target>0&&students[i].target!==students[i].currentRank)needAdjust++;
}
var statsHtml='<div class="status info">总人数: <b>'+students.length+'</b> 人 | ';
statsHtml+='将调整: <b style="color:#d39e00">'+needAdjust+'</b> 人 | ';
statsHtml+='保持: <b style="color:#28a745">'+(students.length-needAdjust)+'</b> 人</div>';
document.getElementById('stats-adjust').innerHTML=statsHtml;

var html='<table><tr><th>当前排名</th><th>序号</th><th>姓名</th><th>初试</th><th>复试</th><th>总分</th><th>目标排名</th><th>状态</th></tr>';
for(var i=0;i<students.length;i++){
var s=students[i];
var need=s.target>0&&s.target!==s.currentRank;
var rowClass=need?'need-adjust':'';
var status=need?'<span style="color:#d39e00;font-weight:bold">将调整</span>':
(s.target>0?'<span style="color:#28a745">✓</span>':'<span style="color:#999">-</span>');
html+='<tr class="'+rowClass+'">';
html+='<td>'+s.currentRank+'</td><td>'+s.seq+'</td><td><b>'+s.name+'</b></td>';
html+='<td>'+s.initial.toFixed(1)+'</td><td>'+s.retest.toFixed(2)+'</td>';
html+='<td>'+s.total.toFixed(4)+'</td>';
html+='<td><input type="number" class="target-input" id="t-'+s.seq+'" value="'+(s.target||'')+'" style="width:70px"></td>';
html+='<td>'+status+'</td></tr>';
}
html+='</table>';
document.getElementById('table-adjust').innerHTML=html;
showMsg('msg-adjust','info','请在"目标排名"列输入期望排名，然后点击"执行智能调整"');
}

function fillCurrent(){
for(var i=0;i<students.length;i++){
var s=students[i];
s.target=s.currentRank;
var input=document.getElementById('t-'+s.seq);
if(input)input.value=s.currentRank;
}
renderTable();
}

function clearTargets(){
for(var i=0;i<students.length;i++){
var s=students[i];
s.target=0;
var input=document.getElementById('t-'+s.seq);
if(input)input.value='';
}
renderTable();
}

function doAdjust(){
for(var i=0;i<students.length;i++){
var s=students[i];
var input=document.getElementById('t-'+s.seq);
s.target=input?parseInt(input.value)||0:0;
}
var toAdjust=[];
for(var i=0;i<students.length;i++){
var s=students[i];
if(s.target>0&&s.target!==s.currentRank)toAdjust.push(s);
}
if(toAdjust.length===0){
showMsg('msg-adjust','warning','⚠️ 没有需要调整的学生');
return;
}
toAdjust.sort(function(a,b){return a.target-b.target;});
mods=[];results=[];
for(var i=0;i<toAdjust.length;i++){
var s=toAdjust[i];
var currentScore=s.total;
var targetScore;
if(s.target<s.currentRank){
var targetStudent=null;
for(var j=0;j<students.length;j++){
if(students[j].currentRank===s.target){targetStudent=students[j];break;}
}
targetScore=targetStudent?targetStudent.total+0.001:currentScore+0.1;
}else{
var targetStudent=null;
for(var j=0;j<students.length;j++){
if(students[j].currentRank===s.target){targetStudent=students[j];break;}
}
targetScore=targetStudent?targetStudent.total-0.001:currentScore-0.1;
}
if(i>0){
var prev=results[i-1];
if(s.target===prev.target)targetScore=prev.targetScore;
else if(s.target<prev.target&&targetScore<=prev.targetScore)targetScore=prev.targetScore+0.001;
else if(s.target>prev.target&&targetScore>=prev.targetScore)targetScore=prev.targetScore-0.001;
}
var targetRetest=(targetScore-s.initial/10)*2;
var factor=s.retest>0?targetRetest/s.retest:1;
factor=Math.max(0.8,Math.min(1.2,factor));
results.push({student:s,targetRank:s.target,currentRank:s.currentRank,targetScore:targetScore,currentScore:currentScore,factor:factor});
}
applyChanges();
}

function applyChanges(){
var modifiedCount=0;
for(var i=0;i<results.length;i++){
var r=results[i];
var s=r.student;
var hasChange=false;
for(var expIdx=0;expIdx<5;expIdx++){
var colStart=EXPERT_COLS[expIdx];
var expName='评委'+(expIdx+1);
for(var subIdx=0;subIdx<4;subIdx++){
var colIdx=colStart+subIdx;
var cellRef=XLSX.utils.encode_cell({r:s.rowIndex,c:colIdx});
var oldVal=ws[cellRef]?ws[cellRef].v:0;
var newVal=70+(oldVal-70)*r.factor;
newVal=Math.max(60,Math.min(100,newVal));
newVal=Math.round(newVal*10)/10;
if(Math.abs(newVal-oldVal)>0.01){
mods.push({student:s.name,expert:expName,subject:SUBJECTS[subIdx],old:oldVal,new:newVal});
ws[cellRef]={v:newVal,t:'n'};
hasChange=true;
}
}
}
if(hasChange)modifiedCount++;
var targetCell=XLSX.utils.encode_cell({r:s.rowIndex,c:COL_TARGET});
ws[targetCell]={v:r.targetRank,t:'n'};
}
var lastCol=data[0].length;
ws[XLSX.utils.encode_cell({r:0,c:lastCol})]={v:'调整后复试分',t:'s'};
ws[XLSX.utils.encode_cell({r:0,c:lastCol+1})]={v:'调整后总分',t:'s'};
ws[XLSX.utils.encode_cell({r:0,c:lastCol+2})]={v:'调整后排名',t:'s'};
for(var i=0;i<students.length;i++){
var s=students[i];
var newRetestSum=0;
for(var expIdx=0;expIdx<5;expIdx++){
var colStart=EXPERT_COLS[expIdx];
for(var subIdx=0;subIdx<4;subIdx++){
var cellRef=XLSX.utils.encode_cell({r:s.rowIndex,c:colStart+subIdx});
newRetestSum+=ws[cellRef]?ws[cellRef].v:0;
}
}
var newRetest=newRetestSum/20;
var newTotal=s.initial/10+newRetest/2;
var res=null;
for(var j=0;j<results.length;j++){if(results[j].student.seq===s.seq){res=results[j];break;}}
var finalRank=res?res.targetRank:s.currentRank;
ws[XLSX.utils.encode_cell({r:s.rowIndex,c:lastCol})]={v:Math.round(newRetest*100)/100,t:'n'};
ws[XLSX.utils.encode_cell({r:s.rowIndex,c:lastCol+1})]={v:Math.round(newTotal*10000)/10000,t:'n'};
ws[XLSX.utils.encode_cell({r:s.rowIndex,c:lastCol+2})]={v:finalRank,t:'n'};
}
showResults(modifiedCount);
}

function showResults(modifiedCount){
var html='<h3 style="margin:20px 0">调整结果</h3>';
html+='<p>修改学生: <b>'+modifiedCount+'</b> 人 | 修改单元格: <b>'+mods.length+'</b> 个</p>';
if(results.length>0){
html+='<table><tr><th>姓名</th><th>原排名</th><th>目标排名</th><th>原总分</th><th>目标总分</th><th>变化</th></tr>';
for(var i=0;i<results.length;i++){
var r=results[i];
var diff=r.targetScore-r.currentScore;
var color=diff>0?'green':(diff<0?'red':'#666');
var sign=diff>0?'+':'';
html+='<tr><td><b>'+r.student.name+'</b></td><td>'+r.currentRank+'</td><td><b>'+r.targetRank+'</b></td>';
html+='<td>'+r.currentScore.toFixed(4)+'</td><td>'+r.targetScore.toFixed(4)+'</td>';
html+='<td style="color:'+color+'">'+sign+diff.toFixed(4)+'</td></tr>';
}
html+='</table>';
}
if(mods.length>0){
html+='<h3 style="margin:20px 0">修改明细</h3>';
html+='<table><tr><th>学生</th><th>评委</th><th>科目</th><th>原分数</th><th>新分数</th><th>变化</th></tr>';
for(var i=0;i<mods.length;i++){
var m=mods[i];
var diff=m.new-m.old;
html+='<tr><td>'+m.student+'</td><td>'+m.expert+'</td><td>'+m.subject+'</td>';
html+='<td>'+m.old.toFixed(1)+'</td><td class="modified">'+m.new.toFixed(1)+'</td>';
html+='<td style="color:'+(diff>0?'green':'red')+'">'+(diff>0?'+':'')+diff.toFixed(1)+'</td></tr>';
}
html+='</table>';
}
document.getElementById('table-result').innerHTML=html;
document.getElementById('download-box').classList.add('show');
showMsg('msg-result','success','✅ 调整完成！');
showSection('result');
}

function downloadFile(){
if(!wb||mods.length===0){alert('没有可导出的数据');return;}
var modData=[['修改记录'],['生成时间',new Date().toLocaleString()],['修改学生数',results.length],['修改单元格数',mods.length],[],['学生','评委','科目','原分数','新分数','变化']];
for(var i=0;i<mods.length;i++){
var m=mods[i];
modData.push([m.student,m.expert,m.subject,m.old,m.new,(m.new-m.old).toFixed(2)]);
}
var modWs=XLSX.utils.aoa_to_sheet(modData);
wb.SheetNames.push('修改记录');
wb.Sheets['修改记录']=modWs;
XLSX.writeFile(wb,'成绩单_已调整.xlsx');
showMsg('msg-result','success','✅ 文件已下载！');
}
</script>
</body>
</html>
